<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Pong</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPCEtLSBQYWRkbGUgaGFuZGxlIC0tPgogIDxyZWN0IHg9IjEyIiB5PSIyMSIgd2lkdGg9IjYiIGhlaWdodD0iMTEiIHJ4PSIyIiBmaWxsPSIjMTExIi8+CiAgPCEtLSBQYWRkbGUgaGVhZCAtLT4KICA8Y2lyY2xlIGN4PSIxNCIgY3k9IjEzIiByPSIxMSIgZmlsbD0iIzExMSIvPgogIDwhLS0gRmFjZSBjdXRvdXQgZm9yIGNlbnRlciBsaW5lIGRldGFpbCAtLT4KICA8Y2lyY2xlIGN4PSIxNCIgY3k9IjEzIiByPSI4LjUiIGZpbGw9IiMzMzMiLz4KICA8IS0tIENlbnRlciB2ZXJ0aWNhbCBsaW5lIC0tPgogIDxyZWN0IHg9IjEzIiB5PSIyIiB3aWR0aD0iMiIgaGVpZ2h0PSIyMiIgZmlsbD0iIzExMSIvPgogIDwhLS0gR3JpcCBsaW5lcyBvbiBoYW5kbGUgLS0+CiAgPHJlY3QgeD0iMTEiIHk9IjI1IiB3aWR0aD0iOCIgaGVpZ2h0PSIxLjUiIHJ4PSIwLjUiIGZpbGw9IiM1NTUiLz4KICA8cmVjdCB4PSIxMSIgeT0iMjgiIHdpZHRoPSI4IiBoZWlnaHQ9IjEuNSIgcng9IjAuNSIgZmlsbD0iIzU1NSIvPgo8L3N2Zz4K">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #000;
      font-family: monospace;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    button {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      font-family: monospace;
      font-size: clamp(13px, 2.5vw, 16px);
      padding: clamp(8px, 2vw, 10px) clamp(14px, 3.5vw, 28px);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover, button.active { background: #fff; color: #000; }
    button:disabled { opacity: 0.3; cursor: default; }

    .label { font-size: clamp(10px, 1.8vw, 13px); opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; align-items: center; gap: clamp(10px, 2.5vw, 16px); padding: 16px; width: 100%; }
    .screen.visible { display: flex; }

    /* ── MENU ── */
    #menu h1 { font-size: clamp(28px, 12vw, 52px); letter-spacing: clamp(4px, 2vw, 8px); margin-bottom: 4px; }

    /* Online panel */
    #online-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 18px 24px;
      width: min(340px, 90vw);
    }
    #ol-code-input {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      font-family: monospace;
      font-size: 32px;
      letter-spacing: 10px;
      text-align: center;
      text-transform: uppercase;
      width: 180px;
      padding: 8px 4px;
      outline: none;
    }
    #ol-code-display {
      font-size: 48px;
      letter-spacing: 12px;
      font-weight: bold;
      text-align: center;
    }
    #ol-status { font-size: 13px; opacity: 0.5; text-align: center; }
    .ol-actions { display: flex; gap: 10px; }

    /* Auth card */
    #auth-card {
      border: 1px solid rgba(255,255,255,0.18);
      padding: 14px 22px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: min(340px, 90vw);
    }
    #auth-loading { display: none; }
    #auth-signin  { display: none; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
    #auth-user    { display: none; align-items: center; gap: 10px; }
    #name-row { display: flex; gap: 6px; align-items: center; width: 100%; }
    #guest-name-input {
      background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff;
      font-family: monospace; font-size: 13px; padding: 5px 10px;
      outline: none; flex: 1; min-width: 0;
    }
    #guest-name-input::placeholder { opacity: 0.35; }
    #guest-name-input:focus { border-color: rgba(255,255,255,0.7); }
    #btn-save-name { font-size: 12px; padding: 5px 12px; white-space: nowrap; }
    #auth-avatar  { width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.35); }
    #auth-name    { font-size: 14px; }
    #auth-provider { font-size: 11px; opacity: 0.4; }
    .auth-provider-btns { display: flex; gap: 8px; }
    .auth-provider-btns button { font-size: 13px; padding: 7px 16px; display: flex; align-items: center; gap: 6px; }
    #auth-signout { font-size: 12px; padding: 4px 12px; opacity: 0.55; }

    /* ── GAME ── */
    #game { display: none; position: fixed; inset: 0; }
    #game.visible { display: block; }
    #game-wrap { position: absolute; top: 50%; left: 50%; transform-origin: center center; width: 800px; }
    #game-top { display: flex; width: 800px; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    #message { font-size: 20px; text-align: center; flex: 1; min-height: 26px; }
    .game-ctrl-btn { font-size: 13px; padding: 5px 12px; opacity: 0.65; border-color: rgba(255,255,255,0.4); flex-shrink: 0; }
    .game-ctrl-btn:hover { opacity: 1; }
    #btn-sound { min-width: 38px; padding: 5px 8px; line-height: 1; display: flex; align-items: center; justify-content: center; }
    #btn-sound svg { width: 18px; height: 18px; display: block; }
    #game-right-controls { display: flex; gap: 6px; align-items: center; }
    #info { margin-top: 9px; font-size: 12px; opacity: 0.4; text-align: center; width: 800px; min-height: 16px; }
    #online-badge {
      position: absolute; top: 8px; right: 8px;
      font-size: 11px; opacity: 0.4;
      pointer-events: none;
    }

    /* ── LEADERBOARD ── */
    #leaderboard h2 { font-size: clamp(20px, 7vw, 32px); letter-spacing: 4px; margin-bottom: 4px; }
    #lb-scroll { width: min(580px, 92vw); overflow-x: auto; }
    #lb-table { width: 100%; border-collapse: collapse; min-width: 320px; }
    #lb-table th, #lb-table td {
      padding: clamp(5px, 1.5vw, 8px) clamp(7px, 2vw, 14px);
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      font-size: clamp(11px, 2vw, 13px);
      white-space: nowrap;
    }
    #lb-table th { opacity: 0.38; font-size: clamp(9px, 1.4vw, 11px); letter-spacing: 2px; text-transform: uppercase; }
    #lb-table tr.gold td   { color: #ffd700; }
    #lb-table tr.silver td { color: #c0c0c0; }
    #lb-table tr.bronze td { color: #cd7f32; }
    #lb-source { font-size: 11px; opacity: 0.3; margin-top: 5px; }
    #lb-empty  { opacity: 0.4; font-size: 14px; margin-top: 8px; }
    .lb-nav { display: flex; gap: 12px; margin-top: 8px; }

    /* Portrait hint */
    #portrait-hint {
      display: none; position: fixed; bottom: 10px; left: 50%;
      transform: translateX(-50%); font-size: 11px; opacity: 0.35;
      pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- ══ MENU ═════════════════════════════════════════════════════════ -->
  <div id="menu" class="screen visible">
    <h1>PONG</h1>

    <div class="label">Mode</div>
    <div class="btn-group">
      <button id="btn-vs-cpu"   class="active" onclick="selectMode('cpu')">vs Computer</button>
      <button id="btn-vs-human" onclick="selectMode('human')">Local</button>
      <button id="btn-online"   onclick="selectMode('online')">Online</button>
    </div>

    <div class="label" id="diff-label">Difficulty</div>
    <div class="btn-group" id="diff-group">
      <button id="btn-easy"   onclick="selectDiff('easy')">Easy</button>
      <button id="btn-medium" class="active" onclick="selectDiff('medium')">Medium</button>
      <button id="btn-hard"   onclick="selectDiff('hard')">Hard</button>
    </div>

    <button id="btn-start" onclick="startGame()"
      style="margin-top:6px;font-size:clamp(14px,4vw,18px);padding:clamp(10px,2.5vw,12px) clamp(30px,8vw,48px);">
      START
    </button>

    <!-- Online panel -->
    <div id="online-panel">
      <!-- Step 1: choose action -->
      <div id="ol-choice" class="ol-actions">
        <button onclick="createRoom()">Create Room</button>
        <button onclick="showJoinForm()">Join Room</button>
      </div>
      <!-- Step 2a: waiting as host -->
      <div id="ol-waiting" style="display:none;flex-direction:column;align-items:center;gap:10px;">
        <div class="label">Your room code</div>
        <div id="ol-code-display"></div>
        <div id="ol-status">Waiting for opponent…</div>
        <button onclick="cancelRoom()" style="font-size:13px;padding:6px 16px;opacity:0.6;">Cancel</button>
      </div>
      <!-- Step 2b: join form -->
      <div id="ol-join-form" style="display:none;flex-direction:column;align-items:center;gap:10px;">
        <div class="label">Enter room code</div>
        <input id="ol-code-input" maxlength="4" autocomplete="off" spellcheck="false" placeholder="XXXX"
          oninput="this.value=this.value.toUpperCase()">
        <div class="ol-actions">
          <button onclick="joinRoom()">Join</button>
          <button onclick="showOlChoice()" style="opacity:0.6;">Back</button>
        </div>
      </div>
    </div>

    <!-- Auth card -->
    <div id="auth-card">
      <div id="auth-loading" class="label">Connecting…</div>
      <div id="auth-signin">
        <div class="label">Your name</div>
        <div id="name-row">
          <input id="guest-name-input" type="text" maxlength="20" placeholder="Enter your name"
            autocomplete="off" spellcheck="false"
            oninput="saveGuestName(this.value)"
            onkeydown="if(event.key==='Enter')this.blur()">
          </div>
        <div class="label" style="margin-top:4px">Sign in to save scores online</div>
        <div class="auth-provider-btns">
          <button onclick="signInGoogle()">
            <svg width="15" height="15" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.7 0 6.7 5.4 2.9 13.3l7.8 6C12.5 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.2 5.2-4.6 6.8l7.2 5.6c4.2-3.9 6.1-9.6 7.1-16.4z"/><path fill="#FBBC05" d="M10.7 28.3A14.7 14.7 0 0 1 9.5 24c0-1.5.3-3 .7-4.3L2.9 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.9 10.7l7.8-6.4z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.2-5.6c-2 1.4-4.6 2.2-8 2.2-6.2 0-11.5-4.2-13.3-9.8l-7.8 6c3.8 7.6 11.8 12.7 21.1 12.7z"/></svg>
            Google
          </button>
          <button onclick="signInGithub()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.32-1.75-1.32-1.75-1.08-.74.08-.72.08-.72 1.2.08 1.83 1.23 1.83 1.23 1.06 1.82 2.79 1.3 3.47.99.11-.77.41-1.3.75-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub
          </button>
        </div>
      </div>
      <div id="auth-user">
        <img id="auth-avatar" src="" alt="" style="display:none;">
        <div><div id="auth-name"></div><div id="auth-provider"></div></div>
        <button id="auth-signout" onclick="doSignOut()">Sign out</button>
      </div>
    </div>

    <button onclick="showLeaderboard()" style="padding:8px 24px;opacity:0.65;">Leaderboard</button>
  </div>

  <!-- ══ GAME ══════════════════════════════════════════════════════════ -->
  <div id="game">
    <div id="game-wrap">
      <div id="game-top">
        <button class="game-ctrl-btn" onclick="goToMenu()">&#8592; Menu</button>
        <div id="message"></div>
        <div id="game-right-controls">
          <button class="game-ctrl-btn" id="btn-sound" onclick="toggleSound()" title="Toggle sound"><svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="7" width="4" height="6"/><polygon points="5,7 11,2 11,18 5,13"/><path d="M13 6.5 Q16.5 10 13 13.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"/><path d="M15.5 4 Q20.5 10 15.5 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"/></svg></button>
          <button class="game-ctrl-btn" id="btn-pause" onclick="togglePause()">Pause</button>
        </div>
      </div>
      <div style="position:relative;line-height:0;">
        <canvas id="c" width="800" height="500" style="border:2px solid #fff;display:block;"></canvas>
        <canvas id="overlay" width="800" height="500" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
        <div id="online-badge"></div>
      </div>
      <div id="info"></div>
    </div>
  </div>

  <!-- ══ LEADERBOARD ═══════════════════════════════════════════════════ -->
  <div id="leaderboard" class="screen">
    <h2>LEADERBOARD</h2>
    <div id="lb-scroll">
      <table id="lb-table">
        <thead><tr><th>#</th><th>Player</th><th>Mode</th><th>Score</th><th>Date</th></tr></thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
    <div id="lb-empty" style="display:none">No games played yet.</div>
    <div id="lb-source" class="lb-source"></div>
    <div class="lb-nav">
      <button onclick="clearLocalScores()" style="font-size:13px;padding:7px 18px;opacity:0.6;">Clear local</button>
      <button onclick="showMenu()" style="font-size:14px;padding:8px 28px;">&#8592; Back</button>
    </div>
  </div>

  <div id="portrait-hint">Rotate to landscape for best experience</div>

  <!-- ══ FIREBASE ══════════════════════════════════════════════════════ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyDZ1Wpeky97MgYIQH2iCR2nYhubNeycZOg",
      authDomain:        "pong-orchid.firebaseapp.com",
      databaseURL:       "https://pong-orchid-default-rtdb.firebaseio.com",
      projectId:         "pong-orchid",
      storageBucket:     "pong-orchid.firebasestorage.app",
      messagingSenderId: "336829577877",
      appId:             "1:336829577877:web:4950a07b6ba4cdb70c799c",
    });

    const fbAuth = firebase.auth();
    const fbFS   = firebase.firestore();
    const fbRTDB = firebase.database();

    // ── Auth UI ───────────────────────────────────────────────────────────
    const authCard   = document.getElementById('auth-card');
    const authSignin = document.getElementById('auth-signin');
    const authUser   = document.getElementById('auth-user');

    authCard.style.display         = 'flex';
    authSignin.style.display       = 'flex';
    authSignin.style.flexDirection = 'column';
    authSignin.style.alignItems    = 'center';

    fbAuth.onAuthStateChanged(user => {
      window.fbCurrentUser = user;
      if (user) {
        authSignin.style.display = 'none';
        authUser.style.display   = 'flex';
        document.getElementById('auth-name').textContent = user.displayName || user.email;
        const av = document.getElementById('auth-avatar');
        if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
        const pid = user.providerData[0]?.providerId || '';
        document.getElementById('auth-provider').textContent =
          pid.includes('google') ? 'via Google' : pid.includes('github') ? 'via GitHub' : '';
      } else {
        authSignin.style.display       = 'flex';
        authSignin.style.flexDirection = 'column';
        authSignin.style.alignItems    = 'center';
        authUser.style.display         = 'none';
      }
    });

    window.fbSignInGoogle = () => fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(console.error);
    window.fbSignInGithub = () => fbAuth.signInWithPopup(new firebase.auth.GithubAuthProvider()).catch(console.error);
    window.fbSignOut      = () => fbAuth.signOut();

    // ── Firestore leaderboard (with 5s timeout) ───────────────────────────
    window.fbSaveEntry = entry =>
      fbFS.collection('leaderboard').add({
        ...entry,
        uid:         window.fbCurrentUser?.uid  || null,
        displayName: myDisplayName() || entry.winner,
        timestamp:   firebase.firestore.FieldValue.serverTimestamp(),
      });

    window.fbGetEntries = () => Promise.race([
      fbFS.collection('leaderboard').orderBy('timestamp', 'desc').limit(20).get()
        .then(s => s.docs.map(d => ({ id: d.id, ...d.data() }))),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000)),
    ]);

    window.fbReady = true;

    // ── Realtime multiplayer helpers ──────────────────────────────────────
    window.rtdb = fbRTDB;
  </script>

  <!-- ══ GAME SCRIPT ═══════════════════════════════════════════════════ -->
  <script>
    const canvas   = document.getElementById('c');
    const ctx      = canvas.getContext('2d');
    const overlay  = document.getElementById('overlay');
    const octx     = overlay.getContext('2d');
    const msg      = document.getElementById('message');
    const info     = document.getElementById('info');
    const btnPause = document.getElementById('btn-pause');
    const btnSound = document.getElementById('btn-sound');

    const W = 800, H = 500;
    const PAD_W = 12, PAD_H = 80, BALL_R = 5, SPEED_INC = 0.3;
    const AI_SPEED = { easy: 2.5, medium: 4,  hard: 6.5 };
    const AI_ERROR = { easy: 40,  medium: 18, hard: 4   };

    // ── Sound ──────────────────────────────────────────────────────────────
    let soundEnabled = true, audioCtx;
    function getAC() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    ['touchstart','mousedown','keydown'].forEach(ev =>
      document.addEventListener(ev, () => audioCtx?.resume(), { passive: true })
    );
    function beep({ freq=440, dur=0.08, vol=0.3, type='square', slide=null }) {
      if (!soundEnabled) return;
      try {
        const ac=getAC(), osc=ac.createOscillator(), gain=ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type=type; osc.frequency.setValueAtTime(freq, ac.currentTime);
        if (slide!==null) osc.frequency.linearRampToValueAtTime(slide, ac.currentTime+dur);
        gain.gain.setValueAtTime(vol, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
        osc.start(ac.currentTime); osc.stop(ac.currentTime+dur+0.01);
      } catch(_) {}
    }
    const after = (ms, fn) => setTimeout(fn, ms);
    const sfx = {
      paddleHit() { beep({ freq:240, dur:0.05, vol:0.45 }); },
      wallHit()   { beep({ freq:480, dur:0.03, vol:0.3  }); },
      score()     { beep({freq:392,dur:0.08,vol:0.4}); after(90,()=>beep({freq:330,dur:0.08,vol:0.4})); after(180,()=>beep({freq:262,dur:0.16,vol:0.5})); },
      win()       { [523,659,784,1047].forEach((f,i)=>after(i*130,()=>beep({freq:f,dur:0.2,vol:0.45}))); },
      click()     { beep({ freq:660, dur:0.04, vol:0.2  }); },
      pause()     { beep({ freq:330, dur:0.08, vol:0.25, slide:220 }); },
      resume()    { beep({ freq:220, dur:0.08, vol:0.25, slide:330 }); },
    };
    function toggleSound() {
      soundEnabled = !soundEnabled;
      btnSound.innerHTML = soundEnabled
        ? `<svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="7" width="4" height="6"/><polygon points="5,7 11,2 11,18 5,13"/><path d="M13 6.5 Q16.5 10 13 13.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"/><path d="M15.5 4 Q20.5 10 15.5 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"/></svg>`
        : `<svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="7" width="4" height="6"/><polygon points="5,7 11,2 11,18 5,13"/><line x1="13" y1="7" x2="19" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="square"/><line x1="19" y1="7" x2="13" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="square"/></svg>`;
      if (soundEnabled) sfx.click();
    }

    // ── State ──────────────────────────────────────────────────────────────
    let mode = 'cpu', difficulty = 'medium';
    let running = false, animId, lastWinner = null, isTouch = false;

    const state = {
      left:     { y: H/2 - PAD_H/2, score: 0 },
      right:    { y: H/2 - PAD_H/2, score: 0 },
      ball:     { x: W/2, y: H/2, vx: 4, vy: 3 },
      aiTarget: H/2,
    };
    const tp = { left: null, right: null };

    // ── Online multiplayer state ───────────────────────────────────────────
    let onlineRole   = null;   // 'host' | 'guest'
    let onlineCode   = null;
    let roomRef      = null;
    let myName       = '';
    let opponentName = '';
    let onlineSubs   = [];     // RTDB listeners to detach on leave
    let lastSyncAt   = 0;
    let myReady      = false;
    let countdownAnimId = null;

    function myDisplayName() {
      return window.fbCurrentUser?.displayName
        || localStorage.getItem('pong_guest_name')?.trim()
        || 'Player';
    }

    function saveGuestName(val) {
      const trimmed = val.trim();
      if (trimmed) localStorage.setItem('pong_guest_name', trimmed);
      else localStorage.removeItem('pong_guest_name');
    }

    // ── Screens ────────────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
      document.getElementById('game').classList.remove('visible');
      if (id === 'game') document.getElementById('game').classList.add('visible');
      else               document.getElementById(id).classList.add('visible');
    }
    function showMenu() { sfx.click(); showScreen('menu'); }
    async function showLeaderboard() { sfx.click(); showScreen('leaderboard'); await renderLeaderboard(); }

    // ── Responsive ─────────────────────────────────────────────────────────
    function resizeGame() {
      const scale = Math.min(window.innerWidth / 816, window.innerHeight / 576, 1);
      document.getElementById('game-wrap').style.transform = `translate(-50%, -50%) scale(${scale})`;
      document.getElementById('portrait-hint').style.display =
        (isTouch && window.innerWidth < window.innerHeight && window.innerWidth < 600) ? 'block' : 'none';
    }
    window.addEventListener('resize', resizeGame);
    window.addEventListener('orientationchange', () => setTimeout(resizeGame, 150));

    // ── Touch ──────────────────────────────────────────────────────────────
    function detectTouch() {
      isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches || ('ontouchstart' in window);
    }
    canvas.addEventListener('touchstart', onCanvasTouch, { passive: false });
    canvas.addEventListener('touchmove',  onCanvasTouch, { passive: false });
    canvas.addEventListener('touchend',   onCanvasTouch, { passive: false });
    canvas.addEventListener('touchcancel',onCanvasTouch, { passive: false });
    function onCanvasTouch(e) {
      e.preventDefault(); isTouch = true;
      tp.left = tp.right = null;
      const rect = canvas.getBoundingClientRect();
      for (const t of e.touches) {
        const cx = (t.clientX - rect.left) / rect.width  * W;
        const cy = (t.clientY - rect.top)  / rect.height * H;
        if (cx < W/2) tp.left = cy; else tp.right = cy;
      }
      if (e.type === 'touchstart' && !running && document.getElementById('game').classList.contains('visible')) {
        if (onlineRole) {
          if (lastWinner === null && !myReady) {
            myReady = true;
            roomRef.child(onlineRole === 'host' ? 'ready/host' : 'ready/guest').set(true);
            msg.textContent = 'Ready! Waiting for opponent…';
          }
          return;
        }
        lastWinner !== null ? playAgain() : beginRunning();
      }
      updateOverlay();
    }

    // ── Menu ───────────────────────────────────────────────────────────────
    function selectMode(m) {
      sfx.click(); mode = m;
      ['cpu','human','online'].forEach(x =>
        document.getElementById('btn-vs-' + (x === 'cpu' ? 'cpu' : x === 'human' ? 'human' : 'online'))
          ?.classList.toggle('active', x === m)
      );
      document.getElementById('btn-vs-cpu').classList.toggle('active',   m === 'cpu');
      document.getElementById('btn-vs-human').classList.toggle('active', m === 'human');
      document.getElementById('btn-online').classList.toggle('active',   m === 'online');

      const cpu = m === 'cpu';
      document.getElementById('diff-label').style.opacity       = cpu ? '0.5'  : '0.15';
      document.getElementById('diff-group').style.opacity       = cpu ? '1'    : '0.25';
      document.getElementById('diff-group').style.pointerEvents = cpu ? 'auto' : 'none';

      const isOnline = m === 'online';
      document.getElementById('btn-start').style.display    = isOnline ? 'none'  : '';
      document.getElementById('online-panel').style.display = isOnline ? 'flex'  : 'none';
      if (isOnline) showOlChoice();
    }

    function selectDiff(d) {
      sfx.click(); difficulty = d;
      ['easy','medium','hard'].forEach(x =>
        document.getElementById('btn-' + x).classList.toggle('active', x === d)
      );
    }

    // ── Auth bridge ────────────────────────────────────────────────────────
    function signInGoogle()  { window.fbSignInGoogle?.(); }
    function signInGithub()  { window.fbSignInGithub?.(); }
    function doSignOut()     { window.fbSignOut?.(); }

    // ── Online lobby UI helpers ────────────────────────────────────────────
    function showOlChoice() {
      document.getElementById('ol-choice').style.display    = 'flex';
      document.getElementById('ol-waiting').style.display   = 'none';
      document.getElementById('ol-join-form').style.display = 'none';
    }
    function showJoinForm() {
      sfx.click();
      document.getElementById('ol-choice').style.display    = 'none';
      document.getElementById('ol-join-form').style.display = 'flex';
      document.getElementById('ol-join-form').style.flexDirection = 'column';
      document.getElementById('ol-join-form').style.alignItems    = 'center';
      document.getElementById('ol-code-input').value = '';
      document.getElementById('ol-code-input').focus();
    }
    function showOlWaiting(code) {
      document.getElementById('ol-choice').style.display    = 'none';
      document.getElementById('ol-join-form').style.display = 'none';
      document.getElementById('ol-waiting').style.display   = 'flex';
      document.getElementById('ol-waiting').style.flexDirection = 'column';
      document.getElementById('ol-waiting').style.alignItems    = 'center';
      document.getElementById('ol-code-display').textContent = code;
    }

    // ── Online room management ─────────────────────────────────────────────
    function genCode() {
      return Math.random().toString(36).substring(2, 6).toUpperCase();
    }

    async function createRoom() {
      sfx.click();
      if (!window.rtdb) { alert('Firebase not connected'); return; }
      let code, ref;
      // find an unused code
      do {
        code = genCode();
        ref  = window.rtdb.ref('rooms/' + code);
        const snap = await ref.once('value');
        if (!snap.exists()) break;
      } while (true);

      myName      = myDisplayName();
      onlineCode  = code;
      onlineRole  = 'host';
      roomRef     = ref;

      await roomRef.set({
        status:      'waiting',
        host:        { name: myName, paddleY: H/2 - PAD_H/2 },
        guest:       null,
        ball:        { x: W/2, y: H/2, vx: 4, vy: 3 },
        score:       { host: 0, guest: 0 },
      });

      // Auto-delete room when host disconnects
      roomRef.onDisconnect().remove();

      showOlWaiting(code);

      // Watch for guest joining
      const guestSub = roomRef.child('guest/name').on('value', snap => {
        if (snap.val()) {
          opponentName = snap.val();
          document.getElementById('ol-status').textContent = `${opponentName} joined!`;
          roomRef.child('status').set('playing');
          roomRef.child('guest/name').off('value', guestSub);
          launchOnlineGame();
        }
      });
    }

    async function joinRoom() {
      sfx.click();
      const code = document.getElementById('ol-code-input').value.toUpperCase().trim();
      if (code.length !== 4) { alert('Enter a 4-letter code'); return; }
      if (!window.rtdb) { alert('Firebase not connected'); return; }

      const ref  = window.rtdb.ref('rooms/' + code);
      const snap = await ref.once('value');
      if (!snap.exists()) { alert('Room not found'); return; }
      const data = snap.val();
      if (data.status !== 'waiting') { alert('Room is full or game already started'); return; }

      myName       = myDisplayName();
      opponentName = data.host?.name || 'Host';
      onlineCode   = code;
      onlineRole   = 'guest';
      roomRef      = ref;

      await roomRef.child('guest').set({ name: myName, paddleY: H/2 - PAD_H/2 });
      roomRef.child('guest').onDisconnect().remove();

      launchOnlineGame();
    }

    async function cancelRoom() {
      sfx.click();
      if (roomRef) { await roomRef.remove(); roomRef = null; }
      onlineRole = onlineCode = null;
      showOlChoice();
    }

    function leaveRoom() {
      onlineSubs.forEach(({ ref, event, cb }) => ref.off(event, cb));
      onlineSubs = [];
      cancelAnimationFrame(countdownAnimId);
      countdownAnimId = null;
      if (roomRef) {
        if (onlineRole === 'host') roomRef.remove();
        else roomRef.child('guest').remove();
        roomRef = null;
      }
      onlineRole = onlineCode = null;
      myReady = false;
    }

    // ── Launch online game ─────────────────────────────────────────────────
    function launchOnlineGame() {
      showScreen('game');
      resizeGame();
      state.left.score = state.right.score = 0;
      state.left.y = state.right.y = H/2 - PAD_H/2;
      state.ball.x = W/2; state.ball.y = H/2; state.ball.vx = 4; state.ball.vy = 3;
      lastWinner = null;
      myReady = false;
      tp.left = tp.right = null;
      btnPause.style.display = 'none';

      document.getElementById('online-badge').textContent = `🔴 ${onlineCode}`;
      msg.textContent = isTouch ? '👆 Tap to ready!' : 'Press SPACE when ready!';
      info.textContent = isTouch
        ? (onlineRole === 'host' ? 'Drag left side — your paddle' : 'Drag right side — your paddle')
        : (onlineRole === 'host' ? 'W/S — paddle  |  Space — ready  |  Esc — leave'
                                 : '↑/↓ — paddle  |  Space — ready  |  Esc — leave');

      setupRTDBListeners();

      // Host initialises ready flags in RTDB
      if (onlineRole === 'host') {
        roomRef.child('ready').set({ host: false, guest: false });
        roomRef.child('resumeAt').remove();
      }
      draw();
    }

    // ── RTDB sync ──────────────────────────────────────────────────────────
    function setupRTDBListeners() {
      function sub(ref, event, cb) {
        ref.on(event, cb);
        onlineSubs.push({ ref, event, cb });
      }

      // ── Ready coordination (both players watch) ──
      sub(roomRef.child('ready'), 'value', snap => {
        if (running || lastWinner !== null) return;
        const r = snap.val();
        if (!r) return;
        if (r.host && r.guest) {
          // Both ready — host triggers countdown via resumeAt, runs it locally too
          if (onlineRole === 'host') {
            roomRef.child('resumeAt').set(Date.now() + 3000);
            startCountdown(3);
          }
          // Guest countdown triggered by resumeAt listener below
        } else {
          const myFlag = onlineRole === 'host' ? r.host : r.guest;
          if (myFlag) msg.textContent = 'Waiting for opponent…';
        }
      });

      // ── Guest listens for countdown/round-resume signal from host ──
      if (onlineRole === 'guest') {
        sub(roomRef.child('resumeAt'), 'value', snap => {
          const t = snap.val();
          if (!t || running) return;
          cancelAnimationFrame(animId);
          cancelAnimationFrame(countdownAnimId);
          running = false;
          const secs = Math.min(3, Math.max(1, Math.round((t - Date.now()) / 1000)));
          startCountdown(secs);
        });
      }

      if (onlineRole === 'host') {
        // Host reads guest paddle
        sub(roomRef.child('guest/paddleY'), 'value', snap => {
          if (snap.val() !== null) state.right.y = snap.val();
        });
        // Host watches for guest leaving
        sub(roomRef.child('guest'), 'value', snap => {
          if (running && snap.val() === null) opponentDisconnected();
        });

      } else {
        // Guest reads ball + host paddle + scores; applies client-side prediction correction
        sub(roomRef.child('ball'), 'value', snap => {
          const b = snap.val();
          if (!b) return;
          const dx = b.x - state.ball.x;
          const dy = b.y - state.ball.y;
          if (Math.abs(dx) > 60 || Math.abs(dy) > 60) {
            // Hard snap — goal reset or large divergence
            Object.assign(state.ball, b);
          } else {
            // Soft correction — adopt server velocity, nudge position gently
            state.ball.vx = b.vx;
            state.ball.vy = b.vy;
            state.ball.x += dx * 0.35;
            state.ball.y += dy * 0.35;
          }
        });
        sub(roomRef.child('host/paddleY'), 'value', snap => {
          if (snap.val() !== null) state.left.y = snap.val();
        });
        sub(roomRef.child('score'), 'value', snap => {
          const s = snap.val();
          if (s) { state.left.score = s.host || 0; state.right.score = s.guest || 0; }
        });
        // Guest watches for win signal from host
        sub(roomRef.child('winner'), 'value', snap => {
          if (snap.val() && running) {
            running = false;
            const winner = snap.val();
            sfx.win();
            msg.textContent = `${winner} wins!`;
            lastWinner = winner;
            after(3000, goToMenu);
          }
        });
        // Guest watches for host leaving
        sub(roomRef.child('host'), 'value', snap => {
          if (running && snap.val() === null) opponentDisconnected();
        });
      }
    }

    // ── Countdown (both sides call this) ───────────────────────────────────
    function startCountdown(n) {
      cancelAnimationFrame(countdownAnimId);
      running = false;

      if (n > 0) {
        msg.textContent = String(n);
        sfx.click();

        // Animate paddles during countdown (no ball physics)
        function cdFrame() {
          if (running) return; // game loop took over, stop
          const SPD = 6;
          if (onlineRole === 'host') {
            if (tp.left !== null) state.left.y = clamp(tp.left - PAD_H/2, 0, H - PAD_H);
            else {
              if (keys['w']||keys['W']) state.left.y = clamp(state.left.y - SPD, 0, H - PAD_H);
              if (keys['s']||keys['S']) state.left.y = clamp(state.left.y + SPD, 0, H - PAD_H);
            }
            syncHostToRTDB();
          } else {
            if (tp.right !== null) state.right.y = clamp(tp.right - PAD_H/2, 0, H - PAD_H);
            else {
              if (keys['ArrowUp'])   state.right.y = clamp(state.right.y - SPD, 0, H - PAD_H);
              if (keys['ArrowDown']) state.right.y = clamp(state.right.y + SPD, 0, H - PAD_H);
            }
            syncGuestToRTDB();
          }
          draw();
          countdownAnimId = requestAnimationFrame(cdFrame);
        }
        countdownAnimId = requestAnimationFrame(cdFrame);
        after(1000, () => startCountdown(n - 1));

      } else {
        msg.textContent = '';
        running = true;
        if (onlineRole === 'host') hostLoop();
        else guestLoop();
      }
    }

    function syncHostToRTDB() {
      const now = Date.now();
      if (now - lastSyncAt < 16) return; // ~60fps
      lastSyncAt = now;
      roomRef.update({
        'ball/x':        state.ball.x,
        'ball/y':        state.ball.y,
        'ball/vx':       state.ball.vx,
        'ball/vy':       state.ball.vy,
        'host/paddleY':  state.left.y,
        'score/host':    state.left.score,
        'score/guest':   state.right.score,
      });
    }

    function syncGuestToRTDB() {
      const now = Date.now();
      if (now - lastSyncAt < 16) return; // ~60fps
      lastSyncAt = now;
      roomRef.child('guest/paddleY').set(state.right.y);
    }

    function opponentDisconnected() {
      running = false;
      cancelAnimationFrame(animId);
      msg.textContent = 'Opponent disconnected';
      after(2500, goToMenu);
    }

    // ── Host game loop ─────────────────────────────────────────────────────
    function hostLoop() {
      hostUpdate();
      draw();
      syncHostToRTDB();
      if (running) animId = requestAnimationFrame(hostLoop);
    }

    function hostUpdate() {
      const SPD = 6;
      // Host controls left paddle
      if (tp.left !== null) {
        state.left.y = clamp(tp.left - PAD_H/2, 0, H - PAD_H);
      } else {
        if (keys['w'] || keys['W']) state.left.y = clamp(state.left.y - SPD, 0, H - PAD_H);
        if (keys['s'] || keys['S']) state.left.y = clamp(state.left.y + SPD, 0, H - PAD_H);
      }
      // Right paddle comes from RTDB listener (guest)

      const b = state.ball;
      b.x += b.vx; b.y += b.vy;

      if (b.y <= BALL_R)     { b.y = BALL_R;     b.vy *= -1; sfx.wallHit(); }
      if (b.y >= H - BALL_R) { b.y = H - BALL_R; b.vy *= -1; sfx.wallHit(); }

      const lp = state.left;
      if (b.x - BALL_R <= PAD_W+20 && b.x - BALL_R >= 20 && b.y >= lp.y && b.y <= lp.y+PAD_H) {
        b.x = PAD_W+20+BALL_R;
        b.vx = Math.abs(b.vx) + SPEED_INC;
        b.vy += ((b.y-(lp.y+PAD_H/2))/(PAD_H/2))*2;
        sfx.paddleHit();
      }
      const rp = state.right;
      if (b.x+BALL_R >= W-PAD_W-20 && b.x+BALL_R <= W-20 && b.y >= rp.y && b.y <= rp.y+PAD_H) {
        b.x = W-PAD_W-20-BALL_R;
        b.vx = -(Math.abs(b.vx) + SPEED_INC);
        b.vy += ((b.y-(rp.y+PAD_H/2))/(PAD_H/2))*2;
        sfx.paddleHit();
      }
      b.vy = clamp(b.vy, -10, 10);

      if (b.x < 0) {
        state.right.score++; sfx.score();
        if (!checkOnlineWin()) {
          running = false; reset(1); syncHostToRTDB();
          roomRef.child('resumeAt').set(Date.now() + 3000);
          startCountdown(3);
        }
      }
      if (b.x > W) {
        state.left.score++; sfx.score();
        if (!checkOnlineWin()) {
          running = false; reset(-1); syncHostToRTDB();
          roomRef.child('resumeAt').set(Date.now() + 3000);
          startCountdown(3);
        }
      }
    }

    function checkOnlineWin() {
      if (state.left.score < 7 && state.right.score < 7) return false;
      running = false;
      const winner = state.left.score >= 7 ? myName : opponentName;
      roomRef.child('winner').set(winner);
      sfx.win();
      msg.textContent = `${winner} wins!`;
      lastWinner = winner;
      saveResult(winner, winner, 'Online');
      after(3000, goToMenu);
      return true;
    }

    // ── Guest game loop ────────────────────────────────────────────────────
    function guestLoop() {
      guestUpdate();
      draw();
      syncGuestToRTDB();
      if (running) animId = requestAnimationFrame(guestLoop);
    }

    function guestUpdate() {
      const SPD = 6;
      // Guest controls right paddle
      if (tp.right !== null) {
        state.right.y = clamp(tp.right - PAD_H/2, 0, H - PAD_H);
      } else {
        if (keys['ArrowUp'])   state.right.y = clamp(state.right.y - SPD, 0, H - PAD_H);
        if (keys['ArrowDown']) state.right.y = clamp(state.right.y + SPD, 0, H - PAD_H);
      }
      // Client-side ball prediction — simulates physics locally between RTDB updates
      // RTDB listener soft-corrects divergence. Eliminates most perceived lag.
      const b = state.ball;
      b.x += b.vx; b.y += b.vy;
      if (b.y <= BALL_R)     { b.y = BALL_R;     b.vy = Math.abs(b.vy); }
      if (b.y >= H - BALL_R) { b.y = H - BALL_R; b.vy = -Math.abs(b.vy); }
      b.vy = clamp(b.vy, -10, 10);
    }

    // ── Local game flow ────────────────────────────────────────────────────
    function startGame() {
      sfx.click();
      showScreen('game');
      resizeGame();
      state.left.score = state.right.score = 0;
      lastWinner = null;
      tp.left = tp.right = null;
      reset(1);
      btnPause.style.display = '';
      document.getElementById('online-badge').textContent = '';
      updateInfo();
      msg.textContent = isTouch ? 'Tap to Start' : 'Press Space to Start';
      btnPause.textContent = 'Pause';
      draw();
    }

    function goToMenu() {
      running = false;
      cancelAnimationFrame(animId);
      if (onlineRole) leaveRoom();
      btnPause.style.display = '';
      showMenu();
    }

    function beginRunning() {
      if (running) return;
      running = true; msg.textContent = ''; btnPause.textContent = 'Pause';
      sfx.resume(); loop();
    }

    function togglePause() {
      if (lastWinner !== null || onlineRole) return;
      running = !running;
      if (running) {
        msg.textContent = ''; btnPause.textContent = 'Pause'; sfx.resume(); loop();
      } else {
        cancelAnimationFrame(animId);
        msg.textContent = isTouch ? 'Tap to Resume' : 'Paused — Space to Resume';
        btnPause.textContent = 'Resume'; sfx.pause();
      }
    }

    function playAgain() {
      state.left.score = state.right.score = 0; lastWinner = null;
      reset(1); msg.textContent = ''; btnPause.textContent = 'Pause';
      running = true; sfx.resume(); loop();
    }

    // ── Keyboard ───────────────────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'Escape') { goToMenu(); return; }
      if (!document.getElementById('game').classList.contains('visible')) return;
      if (e.key === ' ') {
        e.preventDefault();
        if (onlineRole) {
          // Online: space = set ready (only before game starts, once)
          if (!running && lastWinner === null && !myReady) {
            myReady = true;
            roomRef.child(onlineRole === 'host' ? 'ready/host' : 'ready/guest').set(true);
            msg.textContent = 'Ready! Waiting for opponent…';
          }
        } else {
          if (lastWinner !== null) playAgain();
          else if (!running)       beginRunning();
          else                     togglePause();
        }
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    // ── Local game helpers ─────────────────────────────────────────────────
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    function reset(dir = 1) {
      state.ball.x = W/2; state.ball.y = H/2;
      state.ball.vx = 4 * dir;
      state.ball.vy = (Math.random()*4+2) * (Math.random()<0.5?1:-1);
      state.aiTarget = H/2;
    }

    function updateAI() {
      const b=state.ball, spd=AI_SPEED[difficulty], err=AI_ERROR[difficulty];
      if (b.vx>0) {
        const t=(W-20-PAD_W-b.x)/b.vx;
        let py=(b.y+b.vy*t)%(H*2);
        if (py<0) py+=H*2; if (py>H) py=H*2-py;
        state.aiTarget = py + (Math.random()*2-1)*err;
      }
      const center = state.right.y + PAD_H/2;
      if      (center < state.aiTarget-4) state.right.y += spd;
      else if (center > state.aiTarget+4) state.right.y -= spd;
      state.right.y = clamp(state.right.y, 0, H-PAD_H);
    }

    function update() {
      const SPD = 6;
      if (tp.left!==null) { state.left.y = clamp(tp.left-PAD_H/2, 0, H-PAD_H); }
      else {
        if (keys['w']||keys['W']) state.left.y = clamp(state.left.y-SPD, 0, H-PAD_H);
        if (keys['s']||keys['S']) state.left.y = clamp(state.left.y+SPD, 0, H-PAD_H);
      }
      if (mode==='human') {
        if (tp.right!==null) { state.right.y = clamp(tp.right-PAD_H/2, 0, H-PAD_H); }
        else {
          if (keys['ArrowUp'])   state.right.y = clamp(state.right.y-SPD, 0, H-PAD_H);
          if (keys['ArrowDown']) state.right.y = clamp(state.right.y+SPD, 0, H-PAD_H);
        }
      } else { updateAI(); }

      const b=state.ball;
      b.x+=b.vx; b.y+=b.vy;
      if (b.y<=BALL_R)     { b.y=BALL_R;     b.vy*=-1; sfx.wallHit(); }
      if (b.y>=H-BALL_R)   { b.y=H-BALL_R;   b.vy*=-1; sfx.wallHit(); }

      const lp=state.left;
      if (b.x-BALL_R<=PAD_W+20&&b.x-BALL_R>=20&&b.y>=lp.y&&b.y<=lp.y+PAD_H) {
        b.x=PAD_W+20+BALL_R; b.vx=Math.abs(b.vx)+SPEED_INC;
        b.vy+=((b.y-(lp.y+PAD_H/2))/(PAD_H/2))*2; sfx.paddleHit();
      }
      const rp=state.right;
      if (b.x+BALL_R>=W-PAD_W-20&&b.x+BALL_R<=W-20&&b.y>=rp.y&&b.y<=rp.y+PAD_H) {
        b.x=W-PAD_W-20-BALL_R; b.vx=-(Math.abs(b.vx)+SPEED_INC);
        b.vy+=((b.y-(rp.y+PAD_H/2))/(PAD_H/2))*2; sfx.paddleHit();
      }
      b.vy=clamp(b.vy,-10,10);

      if (b.x<0) { state.right.score++; sfx.score(); checkWin(mode==='cpu'?'Computer':'P2'); reset(1);  }
      if (b.x>W) { state.left.score++;  sfx.score(); checkWin('P1'); reset(-1); }
    }

    function checkWin(winner) {
      if (state.left.score<7 && state.right.score<7) return;
      running=false; lastWinner=winner; sfx.win();
      // Map internal label → display name
      const name = winner === 'P1' ? myDisplayName()
                 : winner === 'P2' ? 'P2'
                 : 'Computer';
      msg.textContent = isTouch ? `${name} wins! — Tap to play again` : `${name} wins! — Space to play again`;
      saveResult(winner, name, mode==='cpu'?`vs CPU (${difficulty})`:'Local 2P');
    }

    // ── Draw ───────────────────────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0,0,W,H);
      ctx.setLineDash([10,10]); ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);

      ctx.fillStyle='#fff';
      ctx.fillRect(20, state.left.y, PAD_W, PAD_H);
      ctx.fillRect(W-20-PAD_W, state.right.y, PAD_W, PAD_H);
      ctx.beginPath(); ctx.arc(state.ball.x, state.ball.y, BALL_R, 0, Math.PI*2); ctx.fill();

      ctx.font='bold 48px monospace'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fillText(state.left.score,  W/4,   60);
      ctx.fillText(state.right.score, W*3/4, 60);

      ctx.font='12px monospace'; ctx.fillStyle='rgba(255,255,255,0.28)';
      if (onlineRole) {
        const leftLabel  = onlineRole==='host' ? 'You' : opponentName;
        const rightLabel = onlineRole==='host' ? opponentName : 'You';
        ctx.fillText(leftLabel,  W/4,   80);
        ctx.fillText(rightLabel, W*3/4, 80);
      } else {
        ctx.fillText('P1',                       W/4,   80);
        ctx.fillText(mode==='cpu'?'CPU':'P2',    W*3/4, 80);
      }
    }

    function updateOverlay() {
      octx.clearRect(0,0,W,H);
      if (!isTouch) return;
      if (tp.left  !== null) { octx.fillStyle='rgba(255,255,255,0.05)'; octx.fillRect(0,   0,W/2,H); }
      if (tp.right !== null) { octx.fillStyle='rgba(255,255,255,0.05)'; octx.fillRect(W/2, 0,W/2,H); }
    }

    function updateInfo() {
      if (onlineRole) return;
      info.textContent = isTouch
        ? (mode==='human' ? 'Drag left — P1  |  Drag right — P2' : 'Drag left to move your paddle')
        : (mode==='human' ? 'W/S — P1  |  ↑/↓ — P2  |  Space — Pause  |  Esc — Menu'
                          : 'W/S — paddle  |  Space — Pause  |  Esc — Menu');
    }

    function loop() { update(); draw(); if (running) animId=requestAnimationFrame(loop); }

    // ── Leaderboard ────────────────────────────────────────────────────────
    const LB_KEY = 'pong_leaderboard';
    const loadLB = () => { try { return JSON.parse(localStorage.getItem(LB_KEY))||[]; } catch { return []; } };
    const saveLB = d  => localStorage.setItem(LB_KEY, JSON.stringify(d));

    async function saveResult(winner, displayName, modeLabel) {
      const entry = {
        winner: displayName || winner,
        mode:   modeLabel || (mode==='cpu' ? `vs CPU (${difficulty})` : '2 Players'),
        score:  `${state.left.score}–${state.right.score}`,
        date:   new Date().toLocaleDateString(),
      };
      const lb=loadLB(); lb.unshift(entry); saveLB(lb.slice(0,20));
      if (window.fbReady && window.fbSaveEntry) {
        try { await window.fbSaveEntry(entry); } catch(e) { console.warn('Firestore:', e); }
      }
    }

    async function renderLeaderboard() {
      const body=document.getElementById('lb-body');
      const empty=document.getElementById('lb-empty');
      const src=document.getElementById('lb-source');
      body.innerHTML=`<tr><td colspan="5" style="opacity:0.3;text-align:center;padding:16px">Loading…</td></tr>`;

      let lb, online=false;
      if (window.fbReady && window.fbGetEntries) {
        try { lb=await window.fbGetEntries(); online=true; }
        catch { lb=loadLB(); }
      } else { lb=loadLB(); }

      src.textContent = online ? '🌐 Online leaderboard' : '💾 Local scores only';
      body.innerHTML='';
      empty.style.display = lb.length ? 'none' : 'block';
      lb.forEach((e,i) => {
        const tr=document.createElement('tr');
        if (i===0) tr.classList.add('gold');
        if (i===1) tr.classList.add('silver');
        if (i===2) tr.classList.add('bronze');
        tr.innerHTML=`<td>${i+1}</td><td>${e.winner||e.displayName||'—'}</td><td>${e.mode}</td><td>${e.score}</td><td>${e.date}</td>`;
        body.appendChild(tr);
      });
    }

    function clearLocalScores() {
      if (!confirm('Clear local scores?')) return;
      saveLB([]); renderLeaderboard();
    }

    // ── Init ───────────────────────────────────────────────────────────────
    detectTouch();
    selectMode('cpu');
    selectDiff('medium');
    resizeGame();
    // Restore saved guest name
    const _savedName = localStorage.getItem('pong_guest_name');
    if (_savedName) document.getElementById('guest-name-input').value = _savedName;
  </script>
</body>
</html>
